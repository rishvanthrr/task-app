name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4  # Updated to v4 for better compatibility
        with:
          python-version: '3.9'  # Adjust to match your app's Python version (e.g., from Dockerfile or requirements)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # This installs pytest, Flask, etc.

      - name: Run tests
        run: pytest test_app.py

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t rishi624/task-app:latest .

      - name: Push Docker Image
        run: docker push rishi624/task-app:latest
        
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rishi624/task-app:latest
          format: 'table'
          severity: 'CRITICAL,HIGH'
